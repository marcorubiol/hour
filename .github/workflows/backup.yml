name: Supabase backup → R2

on:
  schedule:
    # Sunday 03:00 UTC.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      source_stamp:
        description: Existing R2 backup stamp to expose as a short-lived schema artifact
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  dump-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: hour-backups
      RETENTION_WEEKS: '12'
      SOURCE_STAMP: ${{ inputs.source_stamp }}
    steps:
      - name: Validate required secrets
        run: |
          missing=()
          for v in SUPABASE_DB_URL R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ENDPOINT; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing secrets: ${missing[*]}"; exit 1
          fi

      - name: Install Supabase CLI
        if: env.SOURCE_STAMP == ''
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Dump schema + data + roles
        if: env.SOURCE_STAMP == ''
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          mkdir -p out
          # Keep managed schemas out of the schema dump (the CLI's default), but
          # include their rows in the data dump. In particular, auth.users must
          # be recoverable so a restore drill can prove that login still works.
          supabase db dump --db-url "$SUPABASE_DB_URL" \
            --data-only --use-copy \
            --exclude storage.buckets_vectors \
            --exclude storage.vector_indexes \
            -f "out/data-${stamp}.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL"             -f "out/schema-${stamp}.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" --role-only -f "out/roles-${stamp}.sql"
          # A managed target already owns Supabase's reserved roles. Keep only
          # application-defined roles so the dump is portable to another
          # hosted project where supautils blocks ALTER ROLE on managed roles.
          roles_file="out/roles-${stamp}.sql"
          sed -E '/^(CREATE|ALTER) ROLE "(anon|authenticated|authenticator|cli_login_.*|dashboard_user|pgbouncer|postgres|service_role|supabase_.*|pgsodium_keyholder|pgsodium_keyiduser|pgsodium_keymaker|pgtle_admin)" /d' \
            "$roles_file" > "${roles_file}.portable"
          mv "${roles_file}.portable" "$roles_file"
          gzip -9 out/*.sql
          docker run --rm postgres:17-alpine \
            psql "$SUPABASE_DB_URL" --no-psqlrc --tuples-only --no-align \
            --set ON_ERROR_STOP=1 --command "
              select jsonb_build_object(
                'format_version', 1,
                'captured_at', timezone('utc', now()),
                'counts', jsonb_build_object(
                  'auth.users', (select count(*) from auth.users),
                  'public.workspace', (select count(*) from public.workspace where deleted_at is null),
                  'public.project', (select count(*) from public.project where deleted_at is null),
                  'public.person', (select count(*) from public.person where deleted_at is null),
                  'public.conversation', (select count(*) from public.conversation where deleted_at is null),
                  'public.performance', (select count(*) from public.performance where deleted_at is null)
                )
              )::text;
            " > out/METADATA.json
          (cd out && sha256sum ./*.sql.gz ./METADATA.json > SHA256SUMS)
          ls -lh out/
          echo "STAMP=${stamp}" >> "$GITHUB_ENV"

      - name: Upload to R2 (S3-compatible)
        if: env.SOURCE_STAMP == ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          for f in out/*.gz out/METADATA.json out/SHA256SUMS; do
            aws s3 cp "$f" "s3://${R2_BUCKET}/weekly/${STAMP}/$(basename "$f")" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors
          done

      - name: Fetch an existing schema from R2
        if: env.SOURCE_STAMP != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_STAMP" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}Z$ ]]; then
            echo "Invalid source_stamp: $SOURCE_STAMP" >&2
            exit 1
          fi
          mkdir -p out
          aws s3 cp \
            "s3://${R2_BUCKET}/weekly/${SOURCE_STAMP}/schema-${SOURCE_STAMP}.sql.gz" \
            "out/schema-${SOURCE_STAMP}.sql.gz" \
            --endpoint-url "$R2_ENDPOINT" \
            --only-show-errors
          echo "STAMP=${SOURCE_STAMP}" >> "$GITHUB_ENV"

      # Schema-only copy for baseline/recovery verification. Production rows
      # remain exclusively in the private R2 backup.
      - name: Upload short-lived schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-schema-${{ env.STAMP }}
          path: |
            out/schema-*.sql.gz
            out/METADATA.json
            out/SHA256SUMS
          if-no-files-found: error
          retention-days: 1

      - name: Prune backups older than RETENTION_WEEKS
        if: env.SOURCE_STAMP == ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          cutoff="$(date -u -d "${RETENTION_WEEKS} weeks ago" +%Y-%m-%d)"
          aws s3 ls "s3://${R2_BUCKET}/weekly/" --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $2}' | sed 's:/$::' \
            | while read -r prefix; do
                [ -z "$prefix" ] && continue
                day="${prefix%%T*}"
                if [[ "$day" < "$cutoff" ]]; then
                  echo "Pruning $prefix (older than $cutoff)"
                  aws s3 rm "s3://${R2_BUCKET}/weekly/${prefix}/" \
                    --recursive --endpoint-url "$R2_ENDPOINT" --only-show-errors
                fi
              done

      - name: Summary
        run: |
          {
            echo "## Supabase schema ${STAMP}"
            echo
            if [ -z "$SOURCE_STAMP" ]; then
              echo "Fresh backup pushed to \`s3://${R2_BUCKET}/weekly/${STAMP}/\`."
            else
              echo "Existing backup exposed as a one-day schema-only artifact."
            fi
            ls -lh out/
          } >> "$GITHUB_STEP_SUMMARY"

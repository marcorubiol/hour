name: Supabase backup → R2

on:
  schedule:
    # Sunday 03:00 UTC.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      source_stamp:
        description: Existing R2 backup stamp to expose as a short-lived schema artifact
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  dump-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: hour-backups
      RETENTION_WEEKS: '12'
      SOURCE_STAMP: ${{ inputs.source_stamp }}
    steps:
      - name: Validate required secrets
        run: |
          missing=()
          for v in SUPABASE_DB_URL R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ENDPOINT; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing secrets: ${missing[*]}"; exit 1
          fi

      - name: Install Supabase CLI
        if: env.SOURCE_STAMP == ''
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Dump schema + data + roles
        if: env.SOURCE_STAMP == ''
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          mkdir -p out
          supabase db dump --db-url "$SUPABASE_DB_URL" --schema public --data-only -f "out/data-${stamp}.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" --schema public           -f "out/schema-${stamp}.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" --role-only               -f "out/roles-${stamp}.sql"
          gzip -9 out/*.sql
          ls -lh out/
          echo "STAMP=${stamp}" >> "$GITHUB_ENV"

      - name: Upload to R2 (S3-compatible)
        if: env.SOURCE_STAMP == ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          for f in out/*.gz; do
            aws s3 cp "$f" "s3://${R2_BUCKET}/weekly/${STAMP}/$(basename "$f")" \
              --endpoint-url "$R2_ENDPOINT" \
              --only-show-errors
          done

      - name: Fetch an existing schema from R2
        if: env.SOURCE_STAMP != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_STAMP" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}Z$ ]]; then
            echo "Invalid source_stamp: $SOURCE_STAMP" >&2
            exit 1
          fi
          mkdir -p out
          aws s3 cp \
            "s3://${R2_BUCKET}/weekly/${SOURCE_STAMP}/schema-${SOURCE_STAMP}.sql.gz" \
            "out/schema-${SOURCE_STAMP}.sql.gz" \
            --endpoint-url "$R2_ENDPOINT" \
            --only-show-errors
          echo "STAMP=${SOURCE_STAMP}" >> "$GITHUB_ENV"

      # Schema-only copy for baseline/recovery verification. Production rows
      # remain exclusively in the private R2 backup.
      - name: Upload short-lived schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-schema-${{ env.STAMP }}
          path: out/schema-*.sql.gz
          if-no-files-found: error
          retention-days: 1

      - name: Prune backups older than RETENTION_WEEKS
        if: env.SOURCE_STAMP == ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          cutoff="$(date -u -d "${RETENTION_WEEKS} weeks ago" +%Y-%m-%d)"
          aws s3 ls "s3://${R2_BUCKET}/weekly/" --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $2}' | sed 's:/$::' \
            | while read -r prefix; do
                [ -z "$prefix" ] && continue
                day="${prefix%%T*}"
                if [[ "$day" < "$cutoff" ]]; then
                  echo "Pruning $prefix (older than $cutoff)"
                  aws s3 rm "s3://${R2_BUCKET}/weekly/${prefix}/" \
                    --recursive --endpoint-url "$R2_ENDPOINT" --only-show-errors
                fi
              done

      - name: Summary
        run: |
          {
            echo "## Supabase schema ${STAMP}"
            echo
            if [ -z "$SOURCE_STAMP" ]; then
              echo "Fresh backup pushed to \`s3://${R2_BUCKET}/weekly/${STAMP}/\`."
            else
              echo "Existing backup exposed as a one-day schema-only artifact."
            fi
            ls -lh out/
          } >> "$GITHUB_STEP_SUMMARY"

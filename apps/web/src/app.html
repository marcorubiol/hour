<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Cascade layer order, declared FIRST — before any Vite-injected
         component <style> (each wrapped in @layer components). CSS fixes
         layer order at first mention; without this, a component style that
         loads before base.css registers `components` as the earliest/lowest
         layer, so :where() defaults out-rank component rules. Mirrors the
         @layer statement in base.css (idempotent). -->
    <style>
      @layer reset, defaults, tokens, layouts, components, components.overrides,
        utilities, overrides;
    </style>
    <meta name="theme-color" content="#f7f5ef" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply theme + mode BEFORE first paint to avoid FOIC.
      // Mirrors $lib/theme.svelte.ts; kept inline so it runs sync.
      // Two axes: data-theme (palette/fonts) + data-mode (light/dark).
      // Mode: 'light' | 'dark' | 'system'. 'system' (or no saved value)
      // follows prefers-color-scheme live; explicit light/dark wins.
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('hour_theme') || 'editorial-sobrio';
          if (theme !== 'editorial-sobrio') root.setAttribute('data-theme', theme);
          var saved = localStorage.getItem('hour_mode');
          var mode = saved === 'light' || saved === 'dark' ? saved : 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) root.setAttribute('data-mode', 'dark');
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/icon.svg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&family=Inter:wght@400..600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
